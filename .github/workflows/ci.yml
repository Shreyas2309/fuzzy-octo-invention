name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Type check (mypy)
        run: uv run poe typecheck

      - name: Type check (basedpyright)
        run: uv run poe typecheck-pyright

      - name: Lint (ruff)
        run: uv run poe lint

      - name: Security scan (bandit)
        run: uv run bandit -r app/ -q -c pyproject.toml
